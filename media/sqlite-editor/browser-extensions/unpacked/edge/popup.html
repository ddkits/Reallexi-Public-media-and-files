<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reallexi SQLite Editor</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popupShell">
      <header>
        <div class="mark">R</div>
        <div>
          <strong>Reallexi SQLite Editor</strong>
          <span>Local SQLite browser editor</span>
        </div>
      </header>
      <button id="openEditor" type="button" class="primary">Open SQLite Editor</button>
      <section class="support" aria-label="Support">
        <button id="githubSponsors" type="button" class="supportButton">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.1-1.3-.3-2.5-1-3.5.3-1.2.3-2.3 0-3.5 0 0-1 0-3 1.5a16.7 16.7 0 0 0-8 0C6 2 5 2 5 2c-.3 1.2-.3 2.3 0 3.5A5.4 5.4 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.4.5-.7 1.1-.9 1.7-.2.6-.2 1.2-.1 1.8v4"></path>
            <path d="M9 18c-4.5 2-5-2-7-2"></path>
          </svg>
          <span>github.com/sponsors/ddkits</span>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M15 3h6v6"></path>
            <path d="M10 14 21 3"></path>
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          </svg>
        </button>
        <button id="buyCoffee" type="button" class="supportButton">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M10 2v2"></path>
            <path d="M14 2v2"></path>
            <path d="M16 8a1 1 0 0 1 1 1v8a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V9a1 1 0 0 1 1-1h11Z"></path>
            <path d="M18 9h1a3 3 0 0 1 0 6h-1"></path>
            <path d="M6 2v2"></path>
          </svg>
          <span>buymeacoffee.com/ddkits</span>
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M15 3h6v6"></path>
            <path d="M10 14 21 3"></path>
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
          </svg>
        </button>
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
